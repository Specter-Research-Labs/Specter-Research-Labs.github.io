<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light" />
        <meta name="robots" content="noindex,follow" />
        <title>SPECTER LABS | Archived Surface</title>
        <link rel="canonical" href="https://specterlab.org/" />
        <link rel="icon" href="assets/logo-black.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="site-shell">
            <main class="site-main">
                <section class="machine-report" aria-label="Archive routing bulletin">
                    <div class="machine-report-cap" aria-hidden="true"></div>
                    <header class="machine-report-title">
                        <p class="machine-report-name">SPECTER LABS</p>
                        <h1>ARCHIVE NOTICE</h1>
                    </header>

                    <section class="machine-report-section" aria-label="Archive status">
                        <div class="machine-report-labels">
                            <p>Status</p>
                            <p>Current</p>
                        </div>
                        <div class="machine-report-values">
                            <p>Frozen archive</p>
                            <p>
                                <a href="https://specterlab.org/">specterlab.org</a>
                            </p>
                        </div>
                    </section>

                    <section class="machine-report-section" aria-label="Archive routing">
                        <div class="machine-report-labels">
                            <p>Action</p>
                            <p>Note</p>
                        </div>
                        <div class="machine-report-values">
                            <p>
                                <a class="primary-link" href="https://specterlab.org/"
                                    >Open current site</a
                                >
                            </p>
                            <p>Update old bookmarks and citations.</p>
                        </div>
                    </section>
                </section>
            </main>
        </div>
    </body>
</html>
